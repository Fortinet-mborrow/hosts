name: Update Adblock Hosts

on:
  schedule:
    # Runs once a day at 06:00 UTC — adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual runs from the GitHub Actions UI.

jobs:
  update-hosts:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Needed to commit the output file back to the repo.

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run update script
        run: python update_adblock.py

      - name: Commit updated files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add adblock_master_updated .last_hosts_date
          # Only commit when there is actually something new.
          git diff --cached --quiet || git commit -m "chore: update adblock_master [skip ci]"
          git push
